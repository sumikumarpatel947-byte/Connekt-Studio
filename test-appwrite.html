<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appwrite Test - Connekt Studio</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .test-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .test-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .test-header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ecf0f1;
            border-radius: 10px;
        }
        .test-section h3 {
            color: #3498db;
            margin-bottom: 15px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin: 5px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
        }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .log-output {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <h1>🚀 Appwrite Integration Test</h1>
            <p>Test your Appwrite database connection and functionality</p>
        </div>

        <div class="test-section">
            <h3>🔗 Connection Test</h3>
            <button class="btn btn-primary" onclick="testConnection()">Test Appwrite Connection</button>
            <button class="btn btn-success" onclick="testDatabase()">Test Database Access</button>
            <div id="connectionStatus"></div>
        </div>

        <div class="test-section">
            <h3>📝 CRUD Operations Test</h3>
            <button class="btn btn-primary" onclick="testAddClass()">Add Test Class</button>
            <button class="btn btn-success" onclick="testGetClasses()">Get All Classes</button>
            <button class="btn btn-danger" onclick="testDeleteClass()">Delete Test Class</button>
            <div id="crudStatus"></div>
        </div>

        <div class="test-section">
            <h3>📊 Real-time Test</h3>
            <button class="btn btn-primary" onclick="testRealtime()">Test Real-time Updates</button>
            <button class="btn btn-success" onclick="stopRealtime()">Stop Real-time</button>
            <div id="realtimeStatus"></div>
        </div>

        <div class="test-section">
            <h3>📋 Console Log</h3>
            <div class="log-output" id="logOutput">
                <div>Appwrite Test Console Ready...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script>
        // Initialize Appwrite
        const client = new Appwrite.Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69d1e218000c0c6bf59f');

        const databases = new Appwrite.Databases(client);

        // Configuration
        const config = {
            DATABASE_ID: 'connekt_studio',
            COLLECTIONS: {
                CLASSES: 'classes'
            }
        };

        let realtimeSubscription = null;
        let testClassId = null;

        // Logging function
        function log(message, type = 'info') {
            const logOutput = document.getElementById('logOutput');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `<span style="color: #3498db">[${timestamp}]</span> ${message}`;
            logOutput.appendChild(logEntry);
            logOutput.scrollTop = logOutput.scrollHeight;
            console.log(message);
        }

        // Status function
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // Test connection
        async function testConnection() {
            log('Testing Appwrite connection...');
            try {
                // Test basic connection
                const account = new Appwrite.Account(client);
                log('✅ Appwrite client initialized successfully');
                log('📋 Project ID: 69d1e218000c0c6bf59f');
                log('🌐 Endpoint: https://cloud.appwrite.io/v1');
                showStatus('connectionStatus', '✅ Appwrite connection successful!', 'success');
            } catch (error) {
                log('❌ Connection failed: ' + error.message);
                showStatus('connectionStatus', '❌ Connection failed: ' + error.message, 'error');
            }
        }

        // Test database access
        async function testDatabase() {
            log('Testing database access...');
            try {
                const response = await databases.list(config.DATABASE_ID, config.COLLECTIONS.CLASSES, [
                    Appwrite.Query.limit(1)
                ]);
                log('✅ Database access successful');
                log(`📊 Found ${response.total} classes in database`);
                showStatus('connectionStatus', '✅ Database access successful!', 'success');
            } catch (error) {
                log('❌ Database access failed: ' + error.message);
                if (error.message.includes('database not found')) {
                    log('💡 Solution: Create database "connekt_studio" in Appwrite dashboard');
                } else if (error.message.includes('collection not found')) {
                    log('💡 Solution: Create collection "classes" in Appwrite dashboard');
                }
                showStatus('connectionStatus', '❌ Database access failed: ' + error.message, 'error');
            }
        }

        // Test add class
        async function testAddClass() {
            log('Testing add class...');
            try {
                const testClass = {
                    name: 'Test Class from Test Page',
                    description: 'This is a test class created from the test page',
                    duration: '60 minutes',
                    price: 999,
                    level: 'All Levels',
                    schedule: 'Flexible',
                    instructor: 'Test Instructor',
                    image_url: 'https://images.unsplash.com/photo-1599901860903-17e6ed7083a0',
                    features: ['Test Feature 1', 'Test Feature 2'],
                    status: 'active',
                    created_by: 'test-user',
                    created_at: new Date().toISOString()
                };

                const response = await databases.createDocument(
                    config.DATABASE_ID,
                    config.COLLECTIONS.CLASSES,
                    Appwrite.ID.unique(),
                    testClass
                );

                testClassId = response.$id;
                log('✅ Class added successfully');
                log(`📝 Class ID: ${testClassId}`);
                log(`📋 Class Name: ${testClass.name}`);
                showStatus('crudStatus', '✅ Test class added successfully!', 'success');
            } catch (error) {
                log('❌ Add class failed: ' + error.message);
                showStatus('crudStatus', '❌ Add class failed: ' + error.message, 'error');
            }
        }

        // Test get classes
        async function testGetClasses() {
            log('Testing get classes...');
            try {
                const response = await databases.listDocuments(
                    config.DATABASE_ID,
                    config.COLLECTIONS.CLASSES,
                    [
                        Appwrite.Query.orderDesc('created_at'),
                        Appwrite.Query.limit(10)
                    ]
                );

                log('✅ Classes retrieved successfully');
                log(`📊 Found ${response.total} classes`);
                response.documents.forEach((cls, index) => {
                    log(`   ${index + 1}. ${cls.name} (ID: ${cls.$id})`);
                });
                showStatus('crudStatus', `✅ Retrieved ${response.total} classes!`, 'success');
            } catch (error) {
                log('❌ Get classes failed: ' + error.message);
                showStatus('crudStatus', '❌ Get classes failed: ' + error.message, 'error');
            }
        }

        // Test delete class
        async function testDeleteClass() {
            if (!testClassId) {
                log('⚠️ No test class to delete. Add a test class first.');
                showStatus('crudStatus', '⚠️ No test class to delete. Add a test class first.', 'info');
                return;
            }

            log('Testing delete class...');
            try {
                await databases.deleteDocument(
                    config.DATABASE_ID,
                    config.COLLECTIONS.CLASSES,
                    testClassId
                );

                log('✅ Class deleted successfully');
                log(`🗑️ Deleted Class ID: ${testClassId}`);
                testClassId = null;
                showStatus('crudStatus', '✅ Test class deleted successfully!', 'success');
            } catch (error) {
                log('❌ Delete class failed: ' + error.message);
                showStatus('crudStatus', '❌ Delete class failed: ' + error.message, 'error');
            }
        }

        // Test real-time
        function testRealtime() {
            log('Testing real-time subscription...');
            try {
                realtimeSubscription = client.subscribe(`databases.${config.DATABASE_ID}.collections.${config.COLLECTIONS.CLASSES}.documents`);
                
                realtimeSubscription.subscribe(response => {
                    log('🔔 Real-time update received!');
                    log(`   Event: ${response.events.join(', ')}`);
                    log(`   Payload: ${JSON.stringify(response.payload, null, 2)}`);
                });

                log('✅ Real-time subscription active');
                log('💡 Try adding a class from admin dashboard to see real-time updates');
                showStatus('realtimeStatus', '✅ Real-time subscription active!', 'success');
            } catch (error) {
                log('❌ Real-time subscription failed: ' + error.message);
                showStatus('realtimeStatus', '❌ Real-time subscription failed: ' + error.message, 'error');
            }
        }

        // Stop real-time
        function stopRealtime() {
            if (realtimeSubscription) {
                realtimeSubscription.close();
                realtimeSubscription = null;
                log('⏹️ Real-time subscription stopped');
                showStatus('realtimeStatus', '⏹️ Real-time subscription stopped', 'info');
            } else {
                log('⚠️ No active real-time subscription');
                showStatus('realtimeStatus', '⚠️ No active real-time subscription', 'info');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 Appwrite Test Page Loaded');
            log('📋 Project ID: 69d1e218000c0c6bf59f');
            log('🗄️ Database: connekt_studio');
            log('📝 Collection: classes');
            log('✅ Ready for testing!');
        });
    </script>
</body>
</html>
