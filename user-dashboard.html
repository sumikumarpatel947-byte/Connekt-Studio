<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Connekt Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #1a5f3f;
            box-shadow: 0 0 0 3px rgba(26, 82, 62, 0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, #1a5f3f, #2c7a5f);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 500;
            text-align: center;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>👤 User Dashboard</h2>
                <p>Welcome back!</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#profile" class="nav-link active">
                    <i class="fas fa-user"></i> Profile
                </a>
                <a href="#enrollments" class="nav-link">
                    <i class="fas fa-graduation-cap"></i> Enrollments
                </a>
                <a href="#settings" class="nav-link">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
            
            <div class="user-info">
                <div class="info-item">
                    <i class="fas fa-user-circle"></i>
                    <div class="info-text">
                        <strong id="userFullName">Loading...</strong>
                        <p id="userEmail">user@example.com</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Profile Section -->
            <section id="profile" class="content-section active">
                <h3>👤 Profile Information</h3>
                
                <form id="userForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Enter your full name">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number">
                    </div>
                    
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" class="form-control" placeholder="Enter your location">
                    </div>
                    
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> Save Profile
                    </button>
                </form>
                
                <div id="statusMessage"></div>
            </section>
            
            <!-- Enrollments Section -->
            <section id="enrollments" class="content-section">
                <h3>🎓 My Enrollments</h3>
                <div id="enrollmentsContent">
                    <p>Loading enrollments...</p>
                </div>
            </section>
            
            <!-- Settings Section -->
            <section id="settings" class="content-section">
                <h3>⚙️ Settings</h3>
                <div class="settings-grid">
                    <div class="setting-item">
                        <h4>🔔 Notifications</h4>
                        <p>Email notifications for new classes</p>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                    <div class="setting-item">
                        <h4>🌙 Dark Mode</h4>
                        <p>Enable dark theme</p>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                    <div class="setting-item">
                        <h4>📧 Data Management</h4>
                        <p>Clear all stored data</p>
                        <button class="btn btn-danger" onclick="clearAllData()">
                            <i class="fas fa-trash"></i> Clear Data
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('User dashboard initialized (frontend only)');
            
            // Load initial data
            loadUsers();
            loadClasses();
            
            // Setup form handlers
            const userForm = document.getElementById('userForm');
            if (userForm) {
                userForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Collect form data
                    const formData = {
                        fullName: document.getElementById("fullName")?.value || '',
                        email: document.getElementById("email")?.value || '',
                        phone: document.getElementById("phone")?.value || '',
                        location: document.getElementById("location")?.value || ''
                    };
                    
                    // Save user
                    saveUser(formData);
                });
            }
        });
        
        // Clear all data function
        function clearAllData() {
            if (confirm('Are you sure you want to clear all data? This cannot be undone.')) {
                localStorage.clear();
                showStatus('All data cleared successfully!', 'success');
                
                // Reload data
                loadUsers();
                loadClasses();
            }
        }
    </script>
</body>
</html>
