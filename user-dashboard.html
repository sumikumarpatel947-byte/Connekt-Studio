<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Connekt Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .user-dashboard {
            display: flex;
            min-height: 100vh;
            background: #f8f9fa;
        }
        
        .user-sidebar {
            width: 250px;
            background: linear-gradient(135deg, #1a5f3f 0%, #2d7a57 100%);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .user-profile {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .user-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .user-email {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .user-nav {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .user-nav li {
            margin-bottom: 5px;
        }
        
        .user-nav a {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .user-nav a:hover,
        .user-nav a.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .user-nav i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .user-main {
            flex: 1;
            padding: 30px;
        }
        
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .user-header h1 {
            color: #1a5f3f;
            margin: 0;
            font-size: 2rem;
            font-family: 'Playfair Display', serif;
        }
        
        .user-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            text-decoration: none;
        }
        
        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-1px);
        }
        
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #1a5f3f;
        }
        
        .stat-card h3 {
            color: #6c757d;
            font-size: 0.9rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #1a5f3f;
            margin: 0;
        }
        
        .dashboard-content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .content-header {
            padding: 20px 25px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .content-header h2 {
            margin: 0;
            color: #1a5f3f;
            font-size: 1.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1a5f3f, #2d7a57);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 95, 63, 0.3);
        }
        
        .content-body {
            padding: 20px;
        }
        
        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a5f3f;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1a5f3f, #2c7a5f);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #2c7a5f, #1a5f3f);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 95, 63, 0.3);
        }
        
        /* Status Messages */
        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-weight: 500;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .content-body {
            padding: 25px;
        }
        
        .enrollment-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #1a5f3f;
        }
        
        .enrollment-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .enrollment-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a5f3f;
            margin: 0;
        }
        
        .enrollment-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .enrollment-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .detail-item i {
            color: #1a5f3f;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            margin: 0 0 10px 0;
            color: #495057;
        }
        
        @media (max-width: 768px) {
            .user-sidebar {
                width: 200px;
            }
            
            .user-main {
                padding: 20px;
            }
            
            .dashboard-stats {
                grid-template-columns: 1fr;
            }
            
            .user-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
        
        @media (max-width: 480px) {
            .user-dashboard {
                flex-direction: column;
            }
            
            .user-sidebar {
                width: 100%;
                padding: 15px;
            }
            
            .user-nav {
                display: flex;
                overflow-x: auto;
                gap: 10px;
            }
            
            .user-nav li {
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="user-dashboard">
        <aside class="user-sidebar">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-email" id="userEmail">Loading...</div>
            </div>
            
            <ul class="user-nav">
                <li><a href="#dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#profile"><i class="fas fa-user"></i> My Profile</a></li>
                <li><a href="#enrollments"><i class="fas fa-clipboard-list"></i> My Enrollments</a></li>
                <li><a href="#schedule"><i class="fas fa-calendar"></i> Schedule</a></li>
                <li><a href="#progress"><i class="fas fa-chart-line"></i> Progress</a></li>
                <li><a href="#settings"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
        </aside>
        
        <main class="user-main">
            <header class="user-header">
                <h1>Welcome Back!</h1>
                <div class="user-actions">
                    <a href="index.html" class="btn-primary">
                        <i class="fas fa-home"></i> Back to Website
                    </a>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>
            
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Active Enrollments</h3>
                    <p class="number" id="activeEnrollments">0</p>
                </div>
                <div class="stat-card">
                    <h3>Classes Completed</h3>
                    <p class="number" id="completedClasses">0</p>
                </div>
                <div class="stat-card">
                    <h3>Membership Days</h3>
                    <p class="number" id="membershipDays">0</p>
                </div>
                <div class="stat-card">
                    <h3>Next Class</h3>
                    <p class="number" id="nextClass">--</p>
                </div>
            </div>
            
            <div class="dashboard-content">
                <div class="content-header">
                    <h2>My Enrollments</h2>
                    <a href="index.html#classes" class="btn-primary">
                        <i class="fas fa-plus"></i> Browse Classes
                    </a>
                </div>
                <div class="content-body" id="enrollmentsContent">
                    <!-- Enrollments will be loaded here -->
                </div>
            </div>
            
            <!-- User Registration Form Section -->
            <div class="dashboard-content" style="margin-top: 30px;">
                <div class="content-header">
                    <h2>Update Profile</h2>
                </div>
                <div class="content-body">
                    <form id="userProfileForm" style="max-width: 600px;">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                        </div>
                        
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender">
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email">
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                        </div>
                        
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" name="location" placeholder="Enter your location">
                        </div>
                        
                        <button type="button" onclick="saveUser()" class="btn-primary">
                            <i class="fas fa-save"></i> Submit
                        </button>
                    </form>
                    
                    <!-- Status Message Area -->
                    <div id="statusMessage" style="margin-top: 20px;"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // Initialize Appwrite
        const client = new Appwrite.Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69d1e218000c0c6bf59f');

        const databases = new Appwrite.Databases(client);
        
        // Appwrite Configuration
        const APPWRITE_CONFIG = {
            DATABASE_ID: 'database-69d2929600321ba774c7',
            COLLECTION_ID: 'collection-users'
        };

        // Appwrite Data Manager Class
        class AppwriteDataManager {
            constructor() {
                this.initialized = false;
            }

            async initialize() {
                try {
                    console.log('Initializing Appwrite connection...');
                    await databases.list(APPWRITE_CONFIG.DATABASE_ID, APPWRITE_CONFIG.COLLECTION_ID, [
                        Appwrite.Query.limit(1)
                    ]);
                    this.initialized = true;
                    console.log('Appwrite initialized successfully');
                } catch (error) {
                    console.error('Appwrite initialization failed:', error);
                    this.initialized = false;
                }
            }

            async saveUser(userData) {
                if (!this.initialized) {
                    await this.initialize();
                }

                try {
                    const response = await databases.createDocument(
                        APPWRITE_CONFIG.DATABASE_ID,
                        APPWRITE_CONFIG.COLLECTION_ID,
                        Appwrite.ID.unique(),
                        userData
                    );
                    console.log('User saved to Appwrite:', response.$id);
                    return response;
                } catch (error) {
                    console.error('Error saving user to Appwrite:', error);
                    throw error;
                }
            }

            async loadUsers() {
                if (!this.initialized) {
                    await this.initialize();
                }

                try {
                    const response = await databases.listDocuments(
                        APPWRITE_CONFIG.DATABASE_ID,
                        APPWRITE_CONFIG.COLLECTION_ID,
                        [
                            Appwrite.Query.orderDesc('$createdAt')
                        ]
                    );
                    console.log('Users loaded from Appwrite:', response.documents.length);
                    return response.documents;
                } catch (error) {
                    console.error('Error loading users from Appwrite:', error);
                    return [];
                }
            }
        }

        // Create global Appwrite data manager instance
        const appwriteManager = new AppwriteDataManager();

        // Status function
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            if (statusDiv) {
                statusDiv.innerHTML = `<div class="status-message ${type}">${message}</div>`;
                setTimeout(() => {
                    statusDiv.innerHTML = '';
                }, 5000);
            }
        }

        // Save user function
        async function saveUser() {
            try {
                const fullName = document.getElementById("fullName")?.value || '';
                const gender = document.getElementById("gender")?.value || '';
                const email = document.getElementById("email")?.value || '';
                const phone = document.getElementById("phone")?.value || '';
                const location = document.getElementById("location")?.value || '';

                if (!fullName || !email || !phone) {
                    showStatus("Please fill in all required fields (Name, Email, Phone)", 'error');
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showStatus("Please enter a valid email address", 'error');
                    return;
                }

                showStatus("Saving user data...", 'info');

                const userData = {
                    fullName,
                    gender,
                    email,
                    phone,
                    location
                };

                const result = await appwriteManager.saveUser(userData);
                showStatus(`User saved successfully! ID: ${result.$id}`, 'success');

                // Clear form after successful submission
                const form = document.getElementById('userProfileForm');
                if (form) {
                    form.reset();
                }

            } catch (error) {
                console.error('Error in saveUser:', error);
                
                if (error.message.includes('duplicate') || error.message.includes('unique')) {
                    showStatus('A user with this email already exists.', 'error');
                } else if (error.message.includes('database not found')) {
                    showStatus('Database not found. Please check Appwrite configuration.', 'error');
                } else if (error.message.includes('collection not found')) {
                    showStatus('Collection not found. Please check Appwrite configuration.', 'error');
                } else {
                    showStatus('Error saving user: ' + error.message, 'error');
                }
            }
        }

        // Load users function
        async function loadUsers() {
            try {
                showStatus('Loading users...', 'info');
                const users = await appwriteManager.loadUsers();
                
                if (users.length === 0) {
                    showStatus('No users found in database.', 'info');
                } else {
                    showStatus(`Loaded ${users.length} users successfully.`, 'success');
                }

                return users;
            } catch (error) {
                console.error('Error in loadUsers:', error);
                showStatus('Error loading users: ' + error.message, 'error');
                return [];
            }
        }

        // Test connection function
        async function testUserAppwriteConnection() {
            try {
                const response = await databases.listDocuments(
                    APPWRITE_CONFIG.DATABASE_ID,
                    APPWRITE_CONFIG.COLLECTION_ID,
                    [Appwrite.Query.limit(1)]
                );
                
                console.log('User dashboard Appwrite connection successful');
                showStatus('Appwrite connection successful!', 'success');
                return true;
            } catch (error) {
                console.error('User dashboard Appwrite connection failed:', error);
                
                if (error.message.includes('database not found')) {
                    showStatus("Database 'database-69d2929600321ba774c7' not found. Please create it in Appwrite dashboard.", 'error');
                } else if (error.message.includes('collection not found')) {
                    showStatus("Collection 'collection-users' not found. Please create it in Appwrite dashboard.", 'error');
                } else {
                    showStatus("Connection failed: " + error.message, 'error');
                }
                
                return false;
            }
        }

        // Decryption function
        function decryptData(encryptedData) {
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedData, 'connekt-studio-secret-key');
                return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
            } catch (error) {
                return null;
            }
        }
        
        // Check authentication
        function checkAuth() {
            const sessionData = sessionStorage.getItem('userSession');
            if (!sessionData) {
                window.location.href = 'login.html';
                return null;
            }
            
            try {
                return JSON.parse(sessionData);
            } catch (error) {
                console.error('Invalid session data:', error);
                sessionStorage.removeItem('userSession');
                window.location.href = 'login.html';
                return null;
            }
        }
        
        // Logout function
        function logout() {
            sessionStorage.removeItem('userSession');
            window.location.href = 'login.html';
        }
        
        // Load user data
        async function loadUserData(userData) {
            try {
                // Get full user details from Appwrite
                const users = await appwriteManager.loadUsers();
                const user = users.find(u => u.$id === userData.userId || u.email === userData.email);
                
                if (user) {
                    // Update dashboard with user data
                    document.querySelector('.user-header h1').textContent = `Welcome Back, ${user.fullName}!`;
                    
                    // Update user info in sidebar
                    const userInfo = document.querySelector('.user-info h3');
                    if (userInfo) {
                        userInfo.textContent = user.fullName;
                    }
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        // Load user enrollments
        function loadUserEnrollments(userId) {
            // For now, show placeholder content
            // In future, this could be enhanced to load from Appwrite
            const content = document.getElementById('enrollmentsContent');
            if (content) {
                content.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #666;">
                        <i class="fas fa-graduation-cap" style="font-size: 48px; margin-bottom: 20px; display: block;"></i>
                        <h3>No enrollments yet</h3>
                        <p>Start your journey by enrolling in our classes!</p>
                        <a href="index.html#classes" class="btn-primary" style="margin-top: 20px;">
                            <i class="fas fa-search"></i> Browse Classes
                        </a>
                    </div>
                `;
            }
        }
        
        // Calculate user stats
        function calculateUserStats(userId) {
            // For now, show placeholder stats
            // In future, this could be enhanced to load from Appwrite
            document.getElementById('activeEnrollments').textContent = '0';
            document.getElementById('completedClasses').textContent = '0';
            document.getElementById('membershipDays').textContent = '1';
            document.getElementById('nextClass').textContent = '--';
        }
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', async function() {
            const userData = checkAuth();
            if (userData) {
                await loadUserData(userData);
                loadUserEnrollments(userData.userId || userData.email);
                calculateUserStats(userData.userId || userData.email);
            }
        });
    </script>
</body>
</html>
