<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Test - Connekt Studio</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .test-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .test-buttons .btn {
            flex: 1;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>👤 User Registration Test</h1>
            <p>Test user data saving to Appwrite database</p>
        </div>

        <form id="userForm">
            <div class="form-group">
                <label for="fullName">Full Name <span class="required">*</span></label>
                <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="phone">Phone <span class="required">*</span></label>
                <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="Enter your location">
            </div>

            <button type="button" class="btn btn-primary" onclick="saveUser()">
                <i class="fas fa-save"></i> Save User to Appwrite
            </button>
        </form>

        <div class="test-buttons">
            <button class="btn btn-success" onclick="testConnection()">
                <i class="fas fa-plug"></i> Test Connection
            </button>
            <button class="btn btn-primary" onclick="viewUsers()">
                <i class="fas fa-users"></i> View Users
            </button>
        </div>

        <div id="statusMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script>
        // Initialize Appwrite
        const client = new Appwrite.Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69d1e218000c0c6bf59f');

        const databases = new Appwrite.Databases(client);
        
        // Appwrite Configuration
        const APPWRITE_CONFIG = {
            DATABASE_ID: 'connekt_studio',
            COLLECTIONS: {
                CUSTOMERS: 'customers',
                USERS: 'users',
                ENROLLMENTS: 'enrollments'
            }
        };

        // Status function
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 5000);
        }

        // Corrected saveUser function
        async function saveUser() {
            try {
                const fullName = document.getElementById("fullName").value;
                const gender = document.getElementById("gender").value;
                const email = document.getElementById("email").value;
                const phone = document.getElementById("phone").value;
                const location = document.getElementById("location").value;

                console.log('Saving user:', { fullName, gender, email, phone, location });

                // Validate inputs
                if (!fullName || !email || !phone) {
                    showStatus("Please fill in all required fields (Name, Email, Phone)", 'error');
                    return;
                }

                showStatus("Saving user to Appwrite...", 'info');

                // Create document in Appwrite
                const response = await databases.createDocument(
                    APPWRITE_CONFIG.DATABASE_ID,
                    APPWRITE_CONFIG.COLLECTIONS.CUSTOMERS,
                    Appwrite.ID.unique(),
                    {
                        fullName,
                        gender,
                        email,
                        phone,
                        location,
                        registration_date: new Date().toISOString(),
                        status: 'active',
                        created_at: new Date().toISOString()
                    }
                );

                console.log('User saved successfully:', response);
                showStatus(`User saved successfully! ID: ${response.$id}`, 'success');

                // Clear form
                document.getElementById("fullName").value = '';
                document.getElementById("gender").value = '';
                document.getElementById("email").value = '';
                document.getElementById("phone").value = '';
                document.getElementById("location").value = '';

            } catch (error) {
                console.error('Error saving user:', error);
                
                // Provide more specific error messages
                if (error.message.includes('database not found')) {
                    showStatus("Database 'connekt_studio' not found. Please create it in Appwrite dashboard.", 'error');
                } else if (error.message.includes('collection not found')) {
                    showStatus("Collection 'customers' not found. Please create it in Appwrite dashboard.", 'error');
                } else if (error.message.includes('duplicate') || error.message.includes('unique')) {
                    showStatus("A user with this email already exists.", 'error');
                } else {
                    showStatus("Error saving data: " + error.message, 'error');
                }
            }
        }

        // Test connection
        async function testConnection() {
            try {
                showStatus("Testing Appwrite connection...", 'info');
                
                const response = await databases.listDocuments(
                    APPWRITE_CONFIG.DATABASE_ID,
                    APPWRITE_CONFIG.COLLECTIONS.CUSTOMERS,
                    [Appwrite.Query.limit(1)]
                );
                
                console.log('Connection successful:', response);
                showStatus(`✅ Connection successful! Found ${response.total} users in database.`, 'success');
                
            } catch (error) {
                console.error('Connection failed:', error);
                
                if (error.message.includes('database not found')) {
                    showStatus("❌ Database 'connekt_studio' not found. Please create it in Appwrite dashboard.", 'error');
                } else if (error.message.includes('collection not found')) {
                    showStatus("❌ Collection 'customers' not found. Please create it in Appwrite dashboard.", 'error');
                } else {
                    showStatus("❌ Connection failed: " + error.message, 'error');
                }
            }
        }

        // View all users
        async function viewUsers() {
            try {
                showStatus("Loading users from Appwrite...", 'info');
                
                const response = await databases.listDocuments(
                    APPWRITE_CONFIG.DATABASE_ID,
                    APPWRITE_CONFIG.COLLECTIONS.CUSTOMERS,
                    [
                        Appwrite.Query.orderDesc('created_at'),
                        Appwrite.Query.limit(10)
                    ]
                );
                
                console.log('Users loaded:', response.documents);
                
                if (response.documents.length === 0) {
                    showStatus("No users found in database. Add your first user!", 'info');
                } else {
                    let userList = '<div style="text-align: left; margin-top: 10px;"><h4>Registered Users:</h4>';
                    response.documents.forEach((user, index) => {
                        userList += `
                            <div style="padding: 10px; border: 1px solid #ecf0f1; margin: 5px 0; border-radius: 5px;">
                                <strong>${index + 1}. ${user.fullName}</strong><br>
                                📧 ${user.email}<br>
                                📱 ${user.phone}<br>
                                📍 ${user.location || 'Not specified'}<br>
                                📅 Registered: ${new Date(user.registration_date).toLocaleDateString()}
                            </div>
                        `;
                    });
                    userList += '</div>';
                    showStatus(`Found ${response.total} users in database. ${userList}`, 'success');
                }
                
            } catch (error) {
                console.error('Error loading users:', error);
                showStatus("Error loading users: " + error.message, 'error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('User Registration Test Page Loaded');
            console.log('Project ID: 69d1e218000c0c6bf59f');
            console.log('Database: connekt_studio');
            console.log('Collection: customers');
        });
    </script>
</body>
</html>
