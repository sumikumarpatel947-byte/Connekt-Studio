<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Connekt Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a5f3f 0%, #2d7a57 100%);
            padding: 20px;
        }
        
        .admin-login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .admin-login-logo {
            margin-bottom: 30px;
        }
        
        .admin-login-logo img {
            height: 60px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        
        .admin-login-logo h2 {
            color: #1a5f3f;
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .admin-login-logo p {
            color: #6c757d;
            margin: 10px 0 0 0;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1a5f3f;
            box-shadow: 0 0 0 3px rgba(26, 95, 63, 0.1);
        }
        
        .admin-login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a5f3f, #2d7a57);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .admin-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 95, 63, 0.3);
        }
        
        .admin-login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-to-site {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .back-to-site:hover {
            color: white;
        }
        
        .error-message,
        .success-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .admin-shield {
            font-size: 4rem;
            color: #1a5f3f;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-login-logo">
                <i class="fas fa-shield-alt admin-shield"></i>
                <img src="Images/logo.png" alt="Connekt Studio">
                <h2>Admin Login</h2>
                <p>Access the admin dashboard</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminUsername">Username</label>
                    <input type="text" id="adminUsername" name="username" required placeholder="Enter admin username">
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" name="password" required placeholder="Enter admin password">
                </div>
                
                <button type="submit" class="admin-login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
                </button>
            </form>
            
            <a href="index.html" class="back-to-site">
                <i class="fas fa-arrow-left"></i> Back to Website
            </a>
        </div>
    </div>
    
    <script>
        // Admin login form submission (UI only)
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide previous messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Simple validation (UI only)
            if (!username || !password) {
                errorMessage.textContent = 'Please enter both username and password';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Admin credentials validation
            const ADMIN_USERNAME = 'admin@connektstudio.com';
            const ADMIN_PASSWORD = 'admin123';
            
            // Validate credentials
            if (username !== ADMIN_USERNAME || password !== ADMIN_PASSWORD) {
                errorMessage.textContent = 'Invalid admin credentials. Please try again.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Credentials correct
            console.log('Admin credentials correct!');
            
            // Show success message
            successMessage.textContent = 'Login successful! Redirecting to admin dashboard...';
            successMessage.style.display = 'block';
            
            // Redirect to admin dashboard after delay
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 1500);
        });
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Admin login page initialized (frontend only)');
        });
    </script>
</body>
</html>
